# Y2K Pixel Blog — Production Docker Compose
#
# Usage:
#   cp .env.example .env  (edit values)
#   docker compose up -d --build
#
# Architecture:
#   Nginx (:80) → frontend (:3000) / admin (:80) / api (:8080)
#   API → PostgreSQL (:5432)
#
# For SSL, either:
#   1. Use Go backend's built-in autocert (Let's Encrypt) — configure in admin panel
#   2. Or put Certbot/Cloudflare in front of Nginx

services:
  # --- PostgreSQL ---
  db:
    image: postgres:16-alpine
    container_name: y2k-blog-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: y2k_blog
      POSTGRES_USER: ${DB_USER:-blog}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-blog}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-blog} -d y2k_blog"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # --- Go API Backend ---
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: y2k-blog-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${DB_USER:-blog}:${DB_PASSWORD:-blog}@db:5432/y2k_blog?sslmode=disable
      PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      AI_API_URL: ${AI_API_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
      GIN_MODE: release
      ACME_CACHE_DIR: /app/certs
    volumes:
      - certs:/app/certs
    networks:
      - internal

  # --- Frontend Blog (Next.js SSR) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://api:8080}
    container_name: y2k-blog-frontend
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://api:8080}
    networks:
      - internal

  # --- Admin Panel (Vite SPA) ---
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${ADMIN_API_URL:-/api}
    container_name: y2k-blog-admin
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - internal

  # --- Nginx Reverse Proxy ---
  nginx:
    image: nginx:alpine
    container_name: y2k-blog-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
      - admin
    networks:
      - internal

volumes:
  pgdata:
  certs:

networks:
  internal:
    driver: bridge

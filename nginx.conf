# Y2K Pixel Blog — Nginx Reverse Proxy
# Handles: frontend (blog) + admin panel + API backend
#
# Architecture:
#   blog.example.com    → frontend:3000  (Next.js SSR)
#   admin.example.com   → admin:80       (Vite SPA via Nginx)
#   /api/*              → api:8080       (Go backend)
#
# SSL is handled by the Go backend (autocert / manual),
# or you can terminate SSL at Nginx level instead.

# Rate limiting zone for API
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# --- Frontend Blog ---
server {
    listen 80;
    server_name blog.example.com;  # ← Change to your frontend domain

    # Proxy to Next.js
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # API proxy (frontend calls /api/* which hits the Go backend)
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Larger body for SSL cert uploads
        client_max_body_size 10m;
    }

    # Static asset caching
    location /_next/static/ {
        proxy_pass http://frontend:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# --- Admin Panel ---
server {
    listen 80;
    server_name admin.example.com;  # ← Change to your admin domain

    # Proxy to Admin Nginx
    location / {
        proxy_pass http://admin:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API proxy
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10m;
    }
}

# --- Fallback (IP direct access → frontend + admin) ---
server {
    listen 80 default_server;
    server_name _;

    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 10m;
    }

    # Admin panel (SPA — strip /admin/ prefix)
    location /admin/ {
        proxy_pass http://admin:80/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}
